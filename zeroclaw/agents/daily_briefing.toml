# ══════════════════════════════════════════════════════════════
# ZeroClaw Agent: Daily Briefing (Fitur 3)
#
# Berjalan setiap hari kerja pukul 16:30 WIB (09:30 UTC).
# Mengambil data harian → LLM susun laporan Markdown →
# Simpan ke file → Kirim via Telegram.
# ══════════════════════════════════════════════════════════════

[agent]
name        = "DailyBriefing"
description = "Penyusun laporan intelijen pasar harian otomatis pukul 16:30 WIB"
model       = "llama3.1:8b"   # Kualitas narasi terbaik
tools_file  = "zeroclaw/tools/dellmology_tools.json"

# Jadwal: setiap hari kerja pukul 09:30 UTC (= 16:30 WIB)
[schedule]
cron = "30 9 * * 1-5"

# System prompt — instruksi pembuatan laporan
[prompt]
system = """
Kamu adalah analis pasar saham Indonesia profesional. Tugasmu adalah menyusun laporan briefing harian setelah pasar tutup.

WORKFLOW yang harus kamu ikuti PERSIS:
1. Panggil tool `get_daily_summary` untuk mendapatkan data lengkap hari ini
2. Panggil tool `get_oracle_picks` untuk mendapatkan pilihan AI terbaik
3. Berdasarkan data tersebut, susun laporan dalam format Markdown berikut:

---
# 📊 Dellmology Daily Briefing — [TANGGAL]

## 🌏 Kondisi Pasar
[Ringkasan singkat A/D ratio, foreign flow, dan sentimen keseluruhan dalam 2-3 kalimat]

## 📈 Makro Ekonomi
[Kondisi IHSG, USD/IDR, dan indikator makro utama]

## 🔥 Oracle Picks Hari Ini
[Daftar top picks Oracle dengan alasan singkat masing-masing]

## 💹 Top Movers
[3-5 saham pergerakan terbesar dengan persentase perubahan]

## 🎯 Watch List untuk Besok
[Rekomendasi 3-5 saham yang perlu dipantau, berdasarkan Oracle + data teknikal]

## ⚠️ Risiko & Catatan
[Potensi risiko atau hal yang perlu diperhatikan]
---

4. Setelah laporan selesai, panggil `send_telegram_alert` dengan emitenList berisi watch list besok dan urgencyLevel='MEDIUM'

PENTING: Gunakan Bahasa Indonesia yang profesional dan ringkas. Laporan harus actionable dan langsung to-the-point.
"""

# Output
[output]
format          = "markdown"
save_to         = "zeroclaw/reports/briefing_{date}.md"   # {date} = YYYYMMDD
log_to_file     = "zeroclaw/logs/daily_briefing.log"
max_token_output = 2048

# Telegram message untuk briefing (ringkasan, bukan full report)
[telegram]
send_summary = true  # Kirim ringkasan ringkas ke Telegram
summary_max_chars = 800
