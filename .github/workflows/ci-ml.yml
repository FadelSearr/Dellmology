name: CI - ML smoke test

on:
  push:
    paths:
      - 'apps/ml-engine/**'
  pull_request:
    paths:
      - 'apps/ml-engine/**'

jobs:
  ml-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install minimal deps
        run: python -m pip install --upgrade pip && pip install numpy
      - name: Generate/train model (train if TF present, else stub)
        run: |
          python apps/ml-engine/train_or_stub.py --output-dir apps/ml-engine --epochs 1 --samples 8
      - name: Start inference server
        run: |
          python apps/ml-engine/inference_server.py &
          sleep 2
      - name: Smoke /infer
        run: |
          curl --fail --silent http://127.0.0.1:5000/infer?symbol=BBCA | jq -r '.' || (cat /dev/null)
